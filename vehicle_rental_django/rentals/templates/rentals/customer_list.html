{% extends 'rentals/base.html' %}
{% block title %}Customers{% endblock %}

{% block content %}
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h2>All Customers</h2>
    <a href="{% url 'add_customer' %}" class="btn btn-success">+ Add Customer</a>
</div>

<div class="card">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Customer Name</th>
                <th>Phone</th>
            </tr>
        </thead>
        <tbody>
            {% for c in customers %}
            <tr>
                <td>{{ c.customer_id }}</td>
                <td>{{ c.customer_name }}</td>
                <td>{{ c.phone }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="3" style="text-align:center;color:#999;">No customers yet</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
