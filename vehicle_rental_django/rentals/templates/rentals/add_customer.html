{% extends 'rentals/base.html' %}
{% block title %}Add Customer{% endblock %}

{% block content %}
<div class="card" style="max-width:500px;">
    <h2>Add Customer</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Customer Name</label>
            <input type="text" name="customer_name" placeholder="e.g. Ravi Kumar" required>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone" placeholder="e.g. 9876543210" maxlength="15" required>
        </div>
        <button type="submit" class="btn btn-success">Add Customer</button>
        <a href="{% url 'customer_list' %}" class="btn" style="background:#eee;color:#333;margin-left:8px;">Cancel</a>
    </form>
</div>
{% endblock %}
