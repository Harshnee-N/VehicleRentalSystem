{% extends 'rentals/base.html' %}
{% block title %}Rent a Vehicle{% endblock %}

{% block content %}
<div class="card" style="max-width:520px;">
    <h2>Rent a Vehicle</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Select Customer</label>
            <select name="customer_id" required>
                <option value="">-- Select Customer --</option>
                {% for c in customers %}
                <option value="{{ c.customer_id }}">{{ c.customer_name }} ({{ c.phone }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Select Vehicle</label>
            <select name="vehicle_id" required>
                <option value="">-- Select Vehicle --</option>
                {% for v in vehicles %}
                <option value="{{ v.vehicle_id }}">{{ v.vehicle_name }} ({{ v.vehicle_type }}) — ₹{{ v.rent_per_day }}/day</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Number of Days</label>
            <input type="number" name="days_rented" placeholder="e.g. 3" min="1" required>
        </div>
        <button type="submit" class="btn btn-warning">Confirm Rental</button>
        <a href="{% url 'dashboard' %}" class="btn" style="background:#eee;color:#333;margin-left:8px;">Cancel</a>
    </form>
</div>
{% endblock %}
