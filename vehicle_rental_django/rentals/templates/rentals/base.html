<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vehicle Rental System{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; color: #333; }

        nav {
            background: #1B4F72;
            padding: 14px 30px;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        nav .brand { color: white; font-size: 20px; font-weight: bold; text-decoration: none; }
        nav a { color: #AED6F1; text-decoration: none; font-size: 14px; }
        nav a:hover { color: white; }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

        .card {
            background: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        h2 { color: #1B4F72; margin-bottom: 20px; }

        table { width: 100%; border-collapse: collapse; }
        th { background: #1B4F72; color: white; padding: 10px 14px; text-align: left; }
        td { padding: 10px 14px; border-bottom: 1px solid #eee; }
        tr:hover td { background: #f0f4f8; }

        .btn {
            display: inline-block;
            padding: 9px 18px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }
        .btn-primary  { background: #1B4F72; color: white; }
        .btn-success  { background: #1E8449; color: white; }
        .btn-danger   { background: #C0392B; color: white; }
        .btn-warning  { background: #D4AC0D; color: #333; }
        .btn:hover    { opacity: 0.88; }

        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select {
            width: 100%; padding: 9px 12px;
            border: 1px solid #ccc; border-radius: 5px;
            font-size: 14px;
        }
        input:focus, select:focus { outline: none; border-color: #1B4F72; }

        .messages { margin-bottom: 15px; }
        .alert {
            padding: 12px 16px; border-radius: 5px;
            margin-bottom: 10px; font-size: 14px;
        }
        .alert-success { background: #D5F5E3; color: #1E8449; border: 1px solid #A9DFBF; }
        .alert-error   { background: #FADBD8; color: #C0392B; border: 1px solid #F1948A; }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-top: 4px solid #1B4F72;
        }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #1B4F72; }
        .stat-card .label  { font-size: 13px; color: #666; margin-top: 4px; }

        .badge {
            display: inline-block; padding: 3px 10px;
            border-radius: 12px; font-size: 12px; font-weight: bold;
        }
        .badge-green  { background: #D5F5E3; color: #1E8449; }
        .badge-red    { background: #FADBD8; color: #C0392B; }
    </style>
</head>
<body>

<nav>
    <a href="{% url 'dashboard' %}" class="brand">🚗 Vehicle Rental System</a>
    <a href="{% url 'vehicle_list' %}">Vehicles</a>
    <a href="{% url 'customer_list' %}">Customers</a>
    <a href="{% url 'rental_history' %}">Rental History</a>
    <a href="{% url 'rent_vehicle' %}">Rent Vehicle</a>
    <a href="/api/vehicles/" style="margin-left:auto;">API Docs ↗</a>
</nav>

<div class="container">
    {% if messages %}
    <div class="messages">
        {% for msg in messages %}
        <div class="alert alert-success">{{ msg }}</div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
