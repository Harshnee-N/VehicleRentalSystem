{% extends 'rentals/base.html' %}
{% block title %}Add Vehicle{% endblock %}

{% block content %}
<div class="card" style="max-width:500px;">
    <h2>Add Vehicle</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Vehicle Name</label>
            <input type="text" name="vehicle_name" placeholder="e.g. Honda City" required>
        </div>
        <div class="form-group">
            <label>Vehicle Type</label>
            <select name="vehicle_type" required>
                <option value="">-- Select Type --</option>
                <option value="Car">Car</option>
                <option value="Bike">Bike</option>
                <option value="Truck">Truck</option>
            </select>
        </div>
        <div class="form-group">
            <label>Rent Per Day (₹)</label>
            <input type="number" name="rent_per_day" placeholder="e.g. 2500" step="0.01" min="0" required>
        </div>
        <button type="submit" class="btn btn-primary">Add Vehicle</button>
        <a href="{% url 'vehicle_list' %}" class="btn" style="background:#eee;color:#333;margin-left:8px;">Cancel</a>
    </form>
</div>
{% endblock %}
